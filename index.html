<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>絶妖星乱舞 マクロ・ホットバー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Cinzel:wght@600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0e1a;
    --bg-2:#0f1626;
    --panel:rgba(18,26,44,.82);
    --panel-2:rgba(12,18,32,.9);
    --slot:#141d31;
    --slot-hi:#1d2a45;
    --border:#2c3a5c;
    --gold:#c9a86a;
    --gold-soft:#e2cd9a;
    --cyan:#7fd7e8;
    --cyan-dim:#5a9fb0;
    --text:#e7ecf5;
    --muted:#8a97b3;
    --red:#e0594f;
    --yellow:#e0c24f;
    --blue:#4fa8e0;
    --purple:#a96fe0;
    --teal:#5fc7b0;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:
      radial-gradient(1200px 600px at 70% -10%, rgba(201,168,106,.08), transparent 60%),
      radial-gradient(900px 500px at 10% 110%, rgba(79,168,224,.07), transparent 60%),
      linear-gradient(160deg,var(--bg),var(--bg-2));
    color:var(--text);
    font-family:"Noto Sans JP",system-ui,-apple-system,"Segoe UI",sans-serif;
    min-height:100%;
    padding:18px clamp(12px,3vw,28px) 40px;
  }
  .wrap{max-width:1280px;margin:0 auto}

  header{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:14px}
  .title h1{
    font-family:"Cinzel",serif;letter-spacing:.06em;
    font-size:clamp(20px,3.4vw,30px);margin:0;font-weight:600;
    color:var(--gold-soft);
    text-shadow:0 1px 0 #000,0 0 24px rgba(201,168,106,.25);
  }
  .title p{margin:4px 0 0;color:var(--muted);font-size:13px;letter-spacing:.02em}
  .actions{display:flex;gap:8px}
  button{font-family:inherit;cursor:pointer}
  .btn{
    background:var(--panel-2);color:var(--text);border:1px solid var(--border);
    border-radius:8px;padding:9px 14px;font-size:13px;font-weight:500;
    transition:border-color .15s,background .15s,transform .05s;
  }
  .btn:hover{border-color:var(--gold);background:var(--slot-hi)}
  .btn:active{transform:translateY(1px)}

  .tabs{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0 18px}
  .tab{
    background:transparent;border:1px solid var(--border);color:var(--muted);
    border-radius:999px;padding:8px 18px;font-size:14px;font-weight:500;letter-spacing:.03em;
    transition:all .15s;
  }
  .tab:hover{color:var(--text);border-color:var(--gold)}
  .tab[aria-selected="true"]{
    background:linear-gradient(180deg,var(--gold),#b18f4f);
    color:#1a1306;border-color:var(--gold);font-weight:700;
    box-shadow:0 4px 16px rgba(201,168,106,.25);
  }

  .layout{display:grid;grid-template-columns:minmax(380px,560px) minmax(0,1fr);gap:22px;align-items:start}
  @media(max-width:900px){.layout{grid-template-columns:1fr}}

  .group{margin-bottom:22px}
  .group-label{
    font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--gold);
    border-left:3px solid var(--gold);padding-left:9px;margin:0 0 11px;
    display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  }
  .group-label small{color:var(--muted);text-transform:none;letter-spacing:0;font-size:12px;font-weight:400}
  .bar{display:flex;flex-wrap:wrap;gap:10px}

  .slot{
    width:82px;height:92px;background:linear-gradient(180deg,var(--slot),#0e1525);
    border:1px solid var(--border);border-radius:9px;
    display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
    padding:10px 4px 6px;gap:7px;position:relative;overflow:hidden;
    transition:transform .07s,border-color .15s,box-shadow .15s;
    color:var(--text);text-align:center;
  }
  .slot:hover{border-color:var(--gold);box-shadow:0 6px 18px rgba(0,0,0,.4),0 0 0 1px rgba(201,168,106,.25) inset;transform:translateY(-2px)}
  .slot:active{transform:translateY(0)}
  .slot:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
  .slot.running{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold) inset,0 0 22px rgba(201,168,106,.5)}

  .icon{
    width:40px;height:40px;border-radius:8px;display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:18px;color:#0c0c0c;flex:none;
    box-shadow:0 2px 6px rgba(0,0,0,.4),0 0 0 1px rgba(255,255,255,.18) inset;
    font-family:"Cinzel",serif;
  }
  .icon.sm{font-size:11px;letter-spacing:-.02em}
  .ic-A,.ic-1{background:radial-gradient(circle at 35% 30%,#ff8b80,var(--red))}
  .ic-B,.ic-2{background:radial-gradient(circle at 35% 30%,#f4dd86,var(--yellow))}
  .ic-C,.ic-3{background:radial-gradient(circle at 35% 30%,#8fcbf4,var(--blue))}
  .ic-D,.ic-4{background:radial-gradient(circle at 35% 30%,#cca0f4,var(--purple))}
  .ic-ref{background:radial-gradient(circle at 35% 30%,#9be3d2,var(--teal))}
  .slot .name{font-size:11px;line-height:1.25;color:var(--muted)}
  .slot:hover .name{color:var(--text)}
  .slot .key{
    position:absolute;top:3px;left:4px;font-size:10px;line-height:1;
    color:var(--gold-soft);opacity:.9;text-shadow:0 1px 2px #000;
    background:rgba(8,12,24,.78);border-radius:4px;padding:2px 4px;
    pointer-events:none;letter-spacing:.02em;
  }

  .chat-wrap{position:sticky;top:14px}
  .panel{
    background:var(--panel);border:1px solid var(--border);border-radius:12px;
    backdrop-filter:blur(6px);overflow:hidden;
  }
  .panel-head{
    display:flex;align-items:center;justify-content:space-between;
    padding:12px 16px;border-bottom:1px solid var(--border);
    background:linear-gradient(180deg,rgba(201,168,106,.1),transparent);
  }
  .panel-head h2{margin:0;font-size:14px;letter-spacing:.05em;color:var(--gold-soft);font-weight:700}
  .log{
    height:min(70vh,720px);overflow:auto;padding:14px 16px;
    font-family:"Noto Sans Mono CJK JP","Source Han Mono","HiraMaxMinPro-W3","Osaka-Mono","MS Gothic",ui-monospace,monospace;
    font-size:16px;line-height:1.6;
  }
  .log::-webkit-scrollbar{width:11px;height:11px}
  .log::-webkit-scrollbar-thumb{background:#243150;border-radius:6px}
  .line{white-space:pre;margin:2px 0;animation:fade .16s ease}
  @keyframes fade{from{opacity:0;transform:translateY(3px)}to{opacity:1}}
  .line.party{color:var(--cyan)}
  .line.party::before{content:"[1] ";color:var(--cyan-dim)}
  .line.system{color:#b7c0a0}
  .line.system::before{content:"\2691 ";color:#8a9470}
  .chat-img{
    display:block;max-width:100%;height:auto;border-radius:10px;
    border:1px solid var(--border);margin:8px 0 4px;
    box-shadow:0 6px 20px rgba(0,0,0,.45);
  }
  .img-fallback{color:var(--muted);font-style:italic}
  .img-fallback a{color:var(--cyan)}
  .empty{color:var(--muted);font-style:italic;white-space:normal}

  /* 全寬特例：寬度=整個頁面內容區，置於熱鍵列上方，不影響按鈕排版 */
  .wideview{display:none;margin:0 0 18px}
  .wideview.show{display:block;animation:fade .18s ease}
  .wideview a{display:block;line-height:0}
  .wideview img{
    display:block;width:100%;height:auto;border-radius:10px;
    border:1px solid var(--border);box-shadow:0 8px 26px rgba(0,0,0,.5);
  }

  .hint{color:var(--muted);font-size:12px;margin:14px 2px 0;line-height:1.6}
  .hint b{color:var(--gold-soft);font-weight:600}

/* ===================== 引擎 ===================== */
const $ = s => document.querySelector(s);
const logEl = $("#log");
const wideEl = $("#wideview");

function escapeHtml(s){return s.replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));}
function renderChips(s){return escapeHtml(s).replace(/《([^》]*)》/g,'<span class="chip">$1</span>');}

function parseMacro(raw){
  const steps=[];
  raw.split("\n").forEach(line=>{
    if(line.startsWith("/p")){
      let t=line.replace(/^\/p ?/,"");
      t=t.replace(/<se\.\d+>/g,"").replace(/<wait\.[\d.]+>/g,"");
      steps.push({type:"chat",text:t});
    } else if(line.startsWith("/mk")){
      const p=line.split(/\s+/);
      steps.push({type:"system",text:`マーカー設置: ${p[1]||""}（自分）`});
    }
    // /micon /mlock は出力なし
  });
  return steps;
}

function clearEmpty(){ const e=logEl.querySelector(".empty"); if(e) logEl.innerHTML=""; }
function appendLine(html,cls){
  clearEmpty();
  const d=document.createElement("div");
  d.className="line "+cls; d.innerHTML=html;
  logEl.appendChild(d); logEl.scrollTop=logEl.scrollHeight;
}
function appendImage(img){
  clearEmpty();
  const el=document.createElement("img");
  el.className="chat-img"; el.src=img.src; el.alt=img.alt||""; el.loading="lazy";
  el.onerror=()=>{
    const f=document.createElement("div");
    f.className="line img-fallback";
    f.innerHTML='圖片載入失敗（可能被原站擋外連）。<a href="'+escapeHtml(img.src)+'" target="_blank" rel="noopener">點此開啟原圖</a>';
    el.replaceWith(f); logEl.scrollTop=logEl.scrollHeight;
  };
  logEl.appendChild(el); logEl.scrollTop=logEl.scrollHeight;
}

function clearLog(){
  logEl.innerHTML="";
  wideEl.innerHTML=""; wideEl.classList.remove("show");
}

function showWide(img){
  wideEl.innerHTML="";
  const a=document.createElement("a");
  a.href=img.src; a.target="_blank"; a.rel="noopener";
  const el=document.createElement("img");
  el.src=img.src; el.alt=img.alt||""; el.loading="lazy";
  el.onerror=()=>{
    wideEl.innerHTML='<div class="img-fallback" style="padding:10px">圖片載入失敗：請確認 P3.jpg 與 index.html 放在同一層、且檔名大小寫一致。</div>';
    wideEl.classList.add("show");
  };
  a.appendChild(el); wideEl.appendChild(a);
  const cap=document.createElement("div");
  cap.className="cap"; cap.textContent="點圖可開新分頁放大";
  wideEl.appendChild(cap);
  wideEl.classList.add("show");
  wideEl.scrollIntoView({behavior:"smooth",block:"nearest"});
}

function flashSlot(slot){ slot.classList.add("running"); setTimeout(()=>slot.classList.remove("running"),320); }

function runMacro(macro,slot){
  flashSlot(slot);
  clearLog();   // /clear：每個宏開頭先清空對話框
  if(macro.image){
    if(macro.image.wide) showWide(macro.image);
    else appendImage(macro.image);
  }
  if(macro.raw){
    parseMacro(macro.raw).forEach(s=>{
      if(s.type==="chat") appendLine(renderChips(s.text)||"&nbsp;","party");
      else if(s.type==="system") appendLine(escapeHtml(s.text),"system");
    });
  }
}

/* ---------- 鍵盤快捷鍵：macro.key（"a"、"shift+3"…），只對目前顯示的分頁生效 ---------- */
let keyMap=[];   // renderBars 時重建：[{spec, macro, slot}]
function parseKey(spec){
  const parts=spec.toLowerCase().split("+"), key=parts.pop();
  let codes=[key];
  if(/^[a-z]$/.test(key)) codes=["Key"+key.toUpperCase()];
  else if(/^[0-9]$/.test(key)) codes=["Digit"+key,"Numpad"+key];
  else if(/^f([1-9]|1[0-2])$/.test(key)) codes=[key.toUpperCase()];
  return {codes,ctrl:parts.includes("ctrl"),alt:parts.includes("alt"),shift:parts.includes("shift")};
}
function keyLabel(spec){
  return spec.split("+").map(p=>({ctrl:"Ctrl+",alt:"Alt+",shift:"⇧"}[p.toLowerCase()]||p.toUpperCase())).join("");
}
document.addEventListener("keydown",e=>{
  if(e.repeat||e.metaKey) return;
  const t=e.target;
  if(t&&(t.tagName==="INPUT"||t.tagName==="TEXTAREA"||t.isContentEditable)) return;
  const hit=keyMap.find(k=>k.spec.codes.includes(e.code)&&e.ctrlKey===k.spec.ctrl&&e.altKey===k.spec.alt&&e.shiftKey===k.spec.shift);
  if(hit){ e.preventDefault(); runMacro(hit.macro,hit.slot); }
});

/* ===================== 介面 ===================== */
const tabsEl=$("#tabs"), barsEl=$("#bars");
function buildTabs(){
  PHASES.forEach((ph,idx)=>{
    const b=document.createElement("button");
    b.className="tab"; b.textContent=ph.label; b.setAttribute("role","tab");
    b.setAttribute("aria-selected", idx===0?"true":"false");
    b.onclick=()=>selectPhase(idx);
    tabsEl.appendChild(b);
  });
}
function selectPhase(idx){
  [...tabsEl.children].forEach((t,i)=>t.setAttribute("aria-selected",i===idx?"true":"false"));
  renderBars(PHASES[idx]);
}
function renderBars(phase){
  barsEl.innerHTML="";
  keyMap=[];
  if(!phase.groups.length) return;
  phase.groups.forEach(g=>{
    const wrap=document.createElement("div"); wrap.className="group";
    const lbl=document.createElement("div"); lbl.className="group-label";
    lbl.innerHTML=`${escapeHtml(g.label)}${g.note?` <small>${escapeHtml(g.note)}</small>`:""}`;
    wrap.appendChild(lbl);
    const bar=document.createElement("div"); bar.className="bar";
    if(g.cols){ bar.style.display="grid"; bar.style.gridTemplateColumns=`repeat(${g.cols},max-content)`; }
    g.macros.forEach(m=>{
      const slot=document.createElement("button");
      slot.className="slot"; slot.type="button";
      const keys=m.key?(Array.isArray(m.key)?m.key:[m.key]):[];
      slot.title=keys.length?`${m.name}（鍵盤：${keys.map(keyLabel).join(" / ")}）`:m.name;
      const icl=String(m.icon.label).length>2?"icon sm":"icon";
      slot.innerHTML=`<span class="${icl} ic-${m.icon.type}">${escapeHtml(m.icon.label)}</span><span class="name">${escapeHtml(m.name)}</span>`
        +(keys.length?`<span class="key">${escapeHtml(keys.map(keyLabel).join("·"))}</span>`:"");
      slot.onclick=()=>runMacro(m,slot);
      keys.forEach(k=>keyMap.push({spec:parseKey(k),macro:m,slot}));
      bar.appendChild(slot);
    });
    wrap.appendChild(bar);
    barsEl.appendChild(wrap);
  });
}

$("#clearBtn").onclick=()=>{ clearLog(); };

buildTabs();
selectPhase(0);
</script>
